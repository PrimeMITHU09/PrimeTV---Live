<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PrimeTV - Premium IPTV</title>
    <link rel="stylesheet" href="style.css">
    <!-- Apple Font Style (Inter) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- HLS.js for M3U8 streaming -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>
<body>
    <div class="app-container">
        <nav class="sidebar">
            <div class="logo">
                <i class="fa-solid fa-tv"></i>
                <h2>PrimeTV</h2>
            </div>
            <ul class="nav-links">
                <li class="active" data-category="bangla">Bangla</li>
                <li data-category="hindi">Kolkata</li>
                <li data-category="news">International News</li>
                <li data-category="sports">FIFA Special</li>
            </ul>
        </nav>

        <!-- Main Content Area -->
        <main class="main-content">
            <header style="display: flex; gap: 15px; justify-content: flex-end; align-items: center;">
                <div class="active-users-badge" title="Live Watching">
                    <i class="fa-solid fa-users"></i>
                    <span>Active Users: <strong id="active-user-count">1,245</strong></span>
                </div>
                <div class="real-users-badge" title="Total Real Visits">
                    <i class="fa-solid fa-eye"></i>
                    <strong id="real-user-count">0</strong>
                </div>
            </header>

            <section class="player-section">
                <div class="video-container glass-panel">
                    <div class="player-placeholder">
                        <i class="fa-regular fa-circle-play pulse-icon"></i>
                        <h2>Select a channel to start streaming</h2>
                        <p>Enjoy premium HD quality channels instantly.</p>
                    </div>
                </div>
            </section>

            <section class="channels-section">
                <div class="section-title">
                    <h2 id="current-category-title">Bangla Channels</h2>
                </div>
                
                <div class="channels-grid" id="channels-grid">
                    <!-- Channels will be dynamically injected here by JS -->
                </div>
            </section>
        </main>
    </div>

    <!-- Background decoration -->
    <div class="bg-shape shape-1"></div>
    <div class="bg-shape shape-2"></div>
    
    <script src="script.js"></script>
</body>
</html>
